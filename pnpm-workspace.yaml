packages: []

allowBuilds:
  '@dep-tree/cli': true
  '@nestjs/core': true
  '@scarf/scarf': true
  '@swc/core': true
  classic-level: true
  core-js: true
  esbuild: true
  rollup: true
  unrs-resolver: true

overrides:
  typescript: 6.0.3 # block native TS7 (no classic JS API — crashes tsc/nest/sonarjs); pairs with renovate TS-major block
  tods-competition-factory: link:../factory
  # Security override — js-yaml GHSA-52cp-r559-cp3m (patched 4.3.0). Dev-only,
  # via @commitlint/cli>cosmiconfig. Scoped to the v4 line.
  js-yaml@4: '>=4.3.0'

# pnpm v11 reads project-level settings from pnpm-workspace.yaml (not from
# .npmrc, which pnpm v11.1.3 no longer merges for non-auth keys).
#
# minimumReleaseAge: 0 disables pnpm v11's supply-chain freshness policy
#   so Renovate bumps to recently-published deps don't block installs or
#   husky pre-commit hooks.
# verifyDepsBeforeRun: false suppresses the deps-status check that fires
#   before every `pnpm <script>` invocation. Lockfiles are routinely
#   briefly stale (mentat-pull-all.sh deletes lockfiles before each
#   build cycle), so the check is noise.
minimumReleaseAge: 0
verifyDepsBeforeRun: false
