name: release-please

# release-please maintains a perpetual release PR on main that
# accumulates conventional commits since the last release. Merging
# the PR creates a GitHub release + a `v{version}` tag and bumps
# package.json + CHANGELOG.md.
#
# We mint a token from the shared `courthive-release-bot` App so the
# `release: published` event fires downstream npm-publish workflows.
# GitHub silently suppresses workflow events triggered by
# GITHUB_TOKEN to prevent recursive runs; minting via an App
# sidesteps that rule. Repos that don't publish today still use the
# App for consistency — same secret rotation across the ecosystem.
#
# Required repo secrets:
#   RELEASE_BOT_CLIENT_ID      — App Client ID (string, e.g. "Iv23li...")
#   RELEASE_BOT_PRIVATE_KEY    — PEM contents (BEGIN/END markers included)
#
# Day-to-day flow:
#   1. Land feat:/fix:/chore:/docs: PRs on main.
#   2. The bot updates a `chore: release X.Y.Z` PR automatically.
#   3. Merge the release PR → GitHub release + tag are created
#      and package.json is bumped.
#
# To force a specific version, edit `.release-please-manifest.json`
# on main directly.
#
# Setup standard: Mentat/standards/RELEASE_PLEASE_SETUP.md

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
